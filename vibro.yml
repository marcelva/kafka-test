blueprint:
  name: Vibrationssensor → Handy Benachrichtigung
  description: Sendet eine Push-Benachrichtigung an mehrere mobile Geräte wenn ein Vibrationssensor auslöst. Unterstützt Zeitfenster.
  domain: automation

  input:

    vibration_sensor:
      name: Vibrationssensor
      description: Sensor der bei Vibration auf ON geht
      selector:
        entity:
          domain: binary_sensor

    notify_devices:
      name: Geräte für Benachrichtigung
      description: Mobile Geräte mit Home Assistant App
      default: []
      selector:
        device:
          integration: mobile_app
          multiple: true

    message:
      name: Nachricht
      description: Text der gesendet wird
      default: "Vibration erkannt!"
      selector:
        text:

    start_time:
      name: Startzeit
      default: "00:00:00"
      selector:
        time: {}

    end_time:
      name: Endzeit
      default: "23:59:00"
      selector:
        time: {}

mode: single

trigger:
  - platform: state
    entity_id: !input vibration_sensor
    to: "on"

condition:
  - condition: time
    after: !input start_time
    before: !input end_time

action:

  - repeat:
      for_each: !input notify_devices
      sequence:
        - service: >
            notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
          data:
            message: !input message
            title: "Home Assistant"