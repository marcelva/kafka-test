blueprint:
  name: Vibrationssensor Benachrichtigung
  description: Sendet eine Push-Benachrichtigung bei Vibration mit konfigurierbarem Zeitfenster.
  domain: automation

  input:

    vibration_sensor:
      name: Vibrationssensor
      description: Sensor der bei Vibration auf ON geht
      selector:
        entity:
          domain: binary_sensor

    notify_service:
      name: Notify Service
      description: Notify Service oder Notify Gruppe
      default: notify.familie_handys
      selector:
        text: {}

    message:
      name: Nachricht
      default: "Vibration erkannt!"
      selector:
        text: {}

    start_time:
      name: Startzeit
      default: "00:00:00"
      selector:
        time: {}

    end_time:
      name: Endzeit
      default: "23:59:00"
      selector:
        time: {}

mode: single

trigger:
  - platform: state
    entity_id: !input vibration_sensor
    to: "on"

condition:
  - condition: time
    after: !input start_time
    before: !input end_time

action:
  - service: !input notify_service
    data:
      message: !input message