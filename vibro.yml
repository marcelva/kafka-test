blueprint:
  name: Vibrationssensor Benachrichtigung
  description: Sendet eine Push-Benachrichtigung wenn ein Vibrationssensor auslöst, mit konfigurierbarem Zeitfenster.
  domain: automation

  input:

    vibration_sensor:
      name: Vibrationssensor
      selector:
        entity:
          domain: binary_sensor

    notify_services:
      name: Notify Services
      description: Mobile App Notify Services (z.B. notify.mobile_app_iphone)
      selector:
        text:
          multiple: true

    start_time:
      name: Startzeit
      default: "00:00:00"
      selector:
        time: {}

    end_time:
      name: Endzeit
      default: "23:59:00"
      selector:
        time: {}

    message:
      name: Nachricht
      default: "Vibration erkannt!"
      selector:
        text: {}

mode: single

trigger:
  - platform: state
    entity_id: !input vibration_sensor
    to: "on"

condition:
  - condition: time
    after: !input start_time
    before: !input end_time

action:
  - variables:
      notify_list: !input notify_services

  - repeat:
      for_each: "{{ notify_list }}"
      sequence:
        - service: "{{ repeat.item }}"
          data:
            message: !input message