blueprint:
  name: Camera Snapshot Advanced (Multi Notify + Cooldown + iOS Critical)
  description: Kamera Snapshot mit Multi-Notify, Cooldown und optional kritischem iOS Alert
  domain: automation

  input:

    trigger_sensor:
      name: Trigger Sensor
      selector:
        entity:
          domain: binary_sensor

    camera_entity:
      name: Kamera
      selector:
        entity:
          domain: camera

    notify_services:
      name: Notify Services
      description: >
        Mehrere Notify Services möglich (z.B. notify.family,
        notify.mobile_app_iphone_max, notify.telegram)
      selector:
        text:
          multiple: true

    message:
      name: Nachricht
      default: Bewegung erkannt
      selector:
        text:

    title:
      name: Titel
      default: Home Assistant
      selector:
        text:

    cooldown_minutes:
      name: Cooldown Minuten
      default: 2
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: minutes
          mode: box

    critical_ios:
      name: Kritischer iOS Alert
      default: false
      selector:
        boolean:

mode: single

trigger:
  - platform: state
    entity_id: !input trigger_sensor
    from: "off"
    to: "on"

variables:

  notify_list: !input notify_services
  cooldown: !input cooldown_minutes
  critical: !input critical_ios
  snapshot_file: "/config/www/snapshot_last.jpg"

action:

  - condition: template
    value_template: >
      {% set last = state_attr(this.entity_id,'last_triggered') %}
      {{ last is none or (as_timestamp(now()) - as_timestamp(last)) > (cooldown*60) }}

  - service: camera.snapshot
    target:
      entity_id: !input camera_entity
    data:
      filename: "{{ snapshot_file }}"

  - repeat:
      for_each: "{{ notify_list }}"
      sequence:

        - service: "{{ repeat.item }}"
          data:
            title: !input title
            message: !input message
            data:
              image: "/local/snapshot_last.jpg"
              push:
                interruption-level: >
                  {% if critical %}critical{% else %}active{% endif %}
                sound:
                  name: default
                  critical: >
                    {% if critical %}1{% else %}0{% endif %}
                  volume: 1.0