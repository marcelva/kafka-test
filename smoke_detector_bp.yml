blueprint:
  name: Rauchmelder Pro mit iOS-Bestätigung
  description: >
    Robuster Blueprint für mehrere Rauchmelder mit iOS Critical Notification,
    frei editierbarem Titel und Nachricht, Bestätigung per Button und
    auswählbaren Rollos, die nur nach Bestätigung hochfahren.
  domain: automation

  input:
    smoke_sensors:
      name: Rauchmelder
      description: Wähle einen oder mehrere Rauchmelder aus.
      selector:
        entity:
          multiple: true
          filter:
            - domain: binary_sensor
              device_class: smoke

    notify_service:
      name: Notify-Service
      description: "Zum Beispiel: notify.mobile_app_iphone_von_marcel oder notify.deine_gruppe"
      selector:
        text:
          type: text
      default: notify.mobile_app_iphone_von_marcel

    rollos:
      name: Rollos / Jalousien (optional)
      description: Wähle die Rollos aus, die nach Bestätigung hochfahren sollen.
      selector:
        entity:
          multiple: true
          filter:
            - domain: cover
      default: []

    title_template:
      name: Titel der Nachricht
      description: "Jinja-Template. Verfügbare Variablen: name, area, time, entity_id"
      selector:
        text:
          multiline: true
      default: "🚨 Rauchalarm: {{ area }}"

    message_template:
      name: Nachricht
      description: "Jinja-Template. Verfügbare Variablen: name, area, time, entity_id"
      selector:
        text:
          multiline: true
      default: >-
        Rauchmelder "{{ name }}" in {{ area }} hat um {{ time }} ausgelöst.
        Bitte in der Nachricht bestätigen, damit die Rollos hochfahren.

    confirmation_timeout:
      name: Bestätigungs-Timeout
      description: Wie lange auf die Bestätigung gewartet wird.
      selector:
        duration:
      default:
        minutes: 5

mode: parallel
max: 10
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input smoke_sensors
    to: "on"

variables:
  notify_service: !input notify_service
  rollos_entities: !input rollos

  alarm_entity_id: >-
    {% set trig = trigger | default({}, true) %}
    {% if trig.to_state is defined and trig.to_state and trig.to_state.entity_id is defined %}
      {{ trig.to_state.entity_id }}
    {% elif trig.entity_id is defined %}
      {{ trig.entity_id }}
    {% else %}
      unknown
    {% endif %}

  name: >-
    {{ state_attr(alarm_entity_id, 'friendly_name') or alarm_entity_id }}

  area: >-
    {{ area_name(alarm_entity_id) or 'Unbekannter Bereich' }}

  time: >-
    {{ now().strftime('%d.%m.%Y %H:%M:%S') }}

  run_id: >-
    {{ as_timestamp(now()) | int }}

  confirm_action: >-
    CONFIRM_ROLLOS_{{ run_id }}

  ignore_action: >-
    IGNORE_ROLLOS_{{ run_id }}

  notification_tag: >-
    {{ 'rauchalarm_' ~ (alarm_entity_id | replace('.', '_')) }}

  has_rollos: >-
    {{ rollos_entities | default([]) | count > 0 }}

action:
  - action: !input notify_service
    data:
      title: !input title_template
      message: !input message_template
      data:
        tag: "{{ notification_tag }}"
        actions:
          - action: "{{ confirm_action }}"
            title: "Rollos hochfahren"
            authenticationRequired: true
          - action: "{{ ignore_action }}"
            title: "Ignorieren"
            destructive: true
        push:
          sound:
            name: default
            critical: 1
            volume: 1.0

  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ confirm_action }}"
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ ignore_action }}"
    timeout: !input confirmation_timeout
    continue_on_timeout: true

  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ wait.trigger is not none and wait.trigger.event.data.action == confirm_action and has_rollos }}
        sequence:
          - action: cover.open_cover
            target:
              entity_id: !input rollos

  - if:
      - condition: template
        value_template: "{{ wait.trigger is not none }}"
    then:
      - action: !input notify_service
        data:
          message: clear_notification
          data:
            tag: "{{ notification_tag }}"