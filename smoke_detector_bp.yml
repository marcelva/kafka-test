blueprint:
  name: "Rauchmelder Pro – iOS-Bestätigung für Rollos"
  description: >
    Robuste Automation mit mehreren Rauchmeldern, kritischer iOS-Benachrichtigung,
    Bestätigungsbuttons und auswählbaren Rollos, die nur nach Bestätigung hochfahren.
  domain: automation

  input:
    smoke_sensors:
      name: "Rauchmelder"
      description: "Wähle einen oder mehrere Rauchmelder aus."
      selector:
        entity:
          multiple: true
          filter:
            - domain: binary_sensor
              device_class: smoke

    notify_service:
      name: "Notify-Service"
      description: "Zum Beispiel: notify.mobile_app_iphone_von_marcel oder eine Notify-Gruppe."
      selector:
        text:
      default: "notify.mobile_app_iphone_von_marcel"

    rollos:
      name: "Rollos / Jalousien (optional)"
      description: "Wähle die Rollos aus, die nach Bestätigung hochfahren sollen."
      selector:
        target:
          entity:
            domain: cover
      default: {}

    title_template:
      name: "Titel"
      description: "Jinja-Template. Verfügbare Variablen: name, area, time, entity_id."
      selector:
        text:
          multiline: true
      default: >-
        🚨 Rauchalarm: {{ area }}

    message_template:
      name: "Nachricht"
      description: "Jinja-Template. Verfügbare Variablen: name, area, time, entity_id."
      selector:
        text:
          multiline: true
      default: >-
        Rauchmelder "{{ name }}" in {{ area }} hat um {{ time }} ausgelöst.
        Tippe auf „Rollos hochfahren“, wenn es ein echter Alarm ist.

    confirmation_timeout:
      name: "Bestätigungs-Timeout"
      description: "Wie lange auf die Bestätigung gewartet wird."
      selector:
        duration:
      default:
        minutes: 5

mode: parallel
max: 10
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input smoke_sensors
    to: "on"

variables:
  notify_service: !input notify_service
  rollos_target: !input rollos

  alarm_entity_id: >-
    {% set e = trigger.get('entity_id') %}
    {% if e %}
      {{ e }}
    {% else %}
      {% set ts = trigger.get('to_state', {}) %}
      {% if ts and ts.get('entity_id') %}
        {{ ts.get('entity_id') }}
      {% else %}
        unknown
      {% endif %}
    {% endif %}

  name: >-
    {{ state_attr(alarm_entity_id, 'friendly_name') or alarm_entity_id }}

  area: >-
    {{ area_name(alarm_entity_id) or 'Unbekannter Bereich' }}

  time: >-
    {{ now().strftime('%d.%m.%Y %H:%M:%S') }}

  action_confirm: >-
    CONFIRM_ROLLOS_{{ context.id }}

  action_dismiss: >-
    DISMISS_ROLLOS_{{ context.id }}

  notification_tag: >-
    rauchalarm_{{ alarm_entity_id | replace('.', '_') }}_{{ context.id }}

action:
  - service: !input notify_service
    data:
      title: !input title_template
      message: !input message_template
      data:
        tag: "{{ notification_tag }}"
        actions:
          - action: "{{ action_confirm }}"
            title: "Rollos hochfahren"
          - action: "{{ action_dismiss }}"
            title: "Ignorieren"
            destructive: true
        push:
          sound:
            name: default
            critical: 1
            volume: 1.0

  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ action_confirm }}"
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ action_dismiss }}"
    timeout: !input confirmation_timeout
    continue_on_timeout: true

  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ wait.trigger is not none
                 and wait.trigger.event.data.action == action_confirm
                 and (rollos_target.get('entity_id', []) | count > 0) }}
        sequence:
          - service: cover.open_cover
            target: !input rollos

  - service: !input notify_service
    data:
      message: clear_notification
      data:
        tag: "{{ notification_tag }}"