blueprint:
  name: Rauchmelder Pro Alarm 2026
  description: >
    Robuster Blueprint für Rauchmelder mit iOS Critical Notifications,
    frei editierbarem Titel und Nachricht, variablen Platzhaltern und
    optional auswählbaren Rollos, die bei Alarm automatisch hochfahren.
  domain: automation

  input:
    smoke_sensors:
      name: Rauchmelder
      description: Wähle einen oder mehrere Rauchmelder aus.
      selector:
        entity:
          multiple: true
          filter:
            - domain: binary_sensor
              device_class: smoke

    notify_service:
      name: Notify-Service
      description: >
        Beispiel: notify.mobile_app_iphone_von_marcel oder notify.deine_gruppe
      selector:
        text:
          type: text
      default: notify.mobile_app_iphone_von_marcel

    title_template:
      name: Titel der Nachricht
      description: >
        Verfügbare Variablen: name, area, time, entity_id
      selector:
        template:
      default: "🚨 Rauchalarm: {{ area }}"

    message_template:
      name: Nachricht
      description: >
        Verfügbare Variablen: name, area, time, entity_id
      selector:
        template:
      default: >-
        Rauchmelder "{{ name }}" in {{ area }} hat um {{ time }} ausgelöst.

    rollos:
      name: Rollos / Jalousien (optional)
      description: Wähle die Rollos aus, die bei Rauchalarm automatisch hochfahren sollen.
      selector:
        target:
          entity:
            domain: cover
      default: {}

mode: single
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input smoke_sensors
    to: "on"

variables:
  notify_service: !input notify_service
  rollos_target: !input rollos

  entity_id: >-
    {% set trig = trigger | default({}) %}
    {% set ent = trig.entity_id if trig.entity_id is defined else none %}
    {% if ent %}
      {{ ent }}
    {% else %}
      {% set ts = trig.to_state if trig.to_state is defined else none %}
      {{ ts.entity_id if ts is not none and ts.entity_id is defined else 'unknown' }}
    {% endif %}

  name: >-
    {{ state_attr(entity_id, 'friendly_name') or entity_id }}

  area: >-
    {{ area_name(entity_id) or 'Unbekannter Bereich' }}

  time: >-
    {{ now().strftime('%d.%m.%Y %H:%M:%S') }}

  has_rollos: >-
    {{ rollos_target | default({}) | length > 0 }}

action:
  - action: !input notify_service
    data:
      title: !input title_template
      message: !input message_template
      data:
        push:
          sound:
            name: default
            critical: 1
            volume: 1.0

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ has_rollos }}"
        sequence:
          - action: cover.open_cover
            target: !input rollos